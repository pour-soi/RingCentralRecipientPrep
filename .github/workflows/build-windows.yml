name: Build PourSend Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build PourSend portable Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest

      - name: Run syntax check
        run: python -m compileall main.py app core tests

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Read application version
        id: version
        shell: pwsh
        run: |
          $version = python -c "from core.version import __version__; print(__version__)"
          "version=$version" >> $env:GITHUB_OUTPUT
          "package=PourSend-v$version-Windows" >> $env:GITHUB_OUTPUT

      - name: Validate branding assets
        shell: pwsh
        run: |
          $required = @(
            "assets/poursend-logo.png",
            "assets/poursend-icon-256.png",
            "assets/poursend.ico"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Required branding asset is missing: $path"
            }
          }

      - name: Build executable
        run: pyinstaller --noconfirm --onefile --windowed --name PourSend --icon assets/poursend.ico --add-data "assets;assets" main.py

      - name: Create portable package
        shell: pwsh
        run: |
          $package = "${{ steps.version.outputs.package }}"
          New-Item -ItemType Directory -Path $package | Out-Null
          Copy-Item dist/PourSend.exe $package/
          Copy-Item README.md $package/
          Copy-Item LICENSE $package/
          Compress-Archive -Path $package -DestinationPath "$package.zip" -Force

      - name: Validate portable package
        shell: pwsh
        run: |
          $package = "${{ steps.version.outputs.package }}"
          $zip = "$package.zip"
          if (-not (Test-Path $zip)) {
            throw "Expected package was not created: $zip"
          }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zip))
          try {
            $entries = @($archive.Entries | ForEach-Object { $_.FullName })
            $required = @(
              "$package/PourSend.exe",
              "$package/README.md",
              "$package/LICENSE"
            )
            foreach ($entry in $required) {
              if ($entries -notcontains $entry) {
                throw "Package validation failed. Missing required file in ZIP: $entry"
              }
            }
          }
          finally {
            $archive.Dispose()
          }

      - name: Generate checksum
        shell: pwsh
        run: |
          $package = "${{ steps.version.outputs.package }}"
          $zip = "$package.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Set-Content "$zip.sha256" -Encoding ascii

      - name: Upload portable package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.version.outputs.package }}
          path: |
            ${{ steps.version.outputs.package }}.zip
            ${{ steps.version.outputs.package }}.zip.sha256
          if-no-files-found: error
